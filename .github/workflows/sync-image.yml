name: Export Image to Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (例如: v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  export-and-release:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 释放 GitHub Runner 磁盘空间 (Jetson 镜像极大，这一步必不可少)
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      # 2. 拉取、导出并多线程压缩镜像
      - name: Pull and Save Image
        run: |
          docker pull ghcr.io/nvidia-ai-iot/llama_cpp:gemma4-jetson-orin
          # 使用 pigz 进行多线程极限压缩，速度比普通 gzip 快得多
          sudo apt-get install -y pigz
          docker save ghcr.io/nvidia-ai-iot/llama_cpp:gemma4-jetson-orin | pigz > jetson_image.tar.gz

      # 3. 将压缩包切分为 1.5GB 的分卷 (绕过 GitHub Release 2GB 限制)
      - name: Split Archive
        run: |
          split -b 1500M jetson_image.tar.gz "jetson_image.tar.gz.part_"

      # 4. 创建 Release 并上传所有分片文件
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: jetson_image.tar.gz.part_*
